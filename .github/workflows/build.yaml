name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Building using the github runner environement directly.
  make:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        targets: [
          [mips32],
          [mips32el],
          [mips64],
          [mips64el]
        ]
      fail-fast: false
    env:
      TARGET: ${{ matrix.targets[0] }}
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libcurl4-openssl-dev libcjson-dev
    - name: Build (Static)
      run: |
        sudo apt-get install -y gcc libcurl4-openssl-dev
        git clone https://github.com/DaveGamble/cJSON.git
        cd cJSON && make && cd ..
        make LDFLAGS="-Wl,-Bstatic -lcurl cJSON/libcjson.a -Wl,-Bdynamic" CFLAGS="-IcJSON"
        ./nbtv --version 
    - uses: actions/upload-artifact@v4
      with:
        name: linux-x64-${{ matrix.targets[0] }}
        path: nbtv

name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Building using the github runner environement directly.
  make:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        targets: [
          [mips32],
          [mips32el],
          [mips64],
          [mips64el]
        ]
      fail-fast: false
    env:
      TARGET: ${{ matrix.targets[0] }}
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mipsel-linux-gnu zlib1g-dev libcurl4-openssl-dev libcjson-dev
    - name: Build (Static)
      run: |
        git clone https://github.com/DaveGamble/cJSON.git
        cd cJSON && make CC=mipsel-linux-gnu-gcc && cd ..
        git clone https://github.com/curl/curl.git
        cd curl && autoreconf -fi
        ./configure --disable-shared --enable-static --without-ssl --without-libpsl --without-librtmp --without-zstd --without-brotli
        make CC=mipsel-linux-gnu-gcc -j$(nproc) && cd ..
        make CC=mipsel-linux-gnu-gcc LDFLAGS="-lcurl -lcjson -lz" CFLAGS="-IcJSON -Icurl/include-static"
        ./nbtv --version 
    - uses: actions/upload-artifact@v4
      with:
        name: linux-x64-${{ matrix.targets[0] }}
        path: nbtv
